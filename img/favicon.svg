<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- VeldWorks Favicon: "The Shift"
       Two angular planes — the old receding, the new advancing.
       Optimized for readability at 16x16 and 32x32. -->
  <rect width="512" height="512" rx="80" fill="#111111"/>
  <!-- Old plane (receding, muted) -->
  <path d="M 100 360 L 200 160 L 310 160 L 210 360 Z" fill="#595755" opacity="0.4"/>
  <!-- New plane (advancing, oxide) -->
  <path d="M 210 330 L 310 130 L 420 130 L 320 330 Z" fill="#C4573C"/>
</svg>
