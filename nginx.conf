# ═══════════════════════════════════════════════════════════
# VeldWorks — nginx configuration
# Target: Hostinger VPS (Ubuntu 22.04)
#
# DEPLOY STEPS:
# 1. Upload this repo to /var/www/veldworks on the VPS
# 2. Copy this file to /etc/nginx/sites-available/veldworks
# 3. ln -s /etc/nginx/sites-available/veldworks /etc/nginx/sites-enabled/
# 4. nginx -t && systemctl reload nginx
# 5. Run: certbot --nginx -d veldworks.nl -d www.veldworks.nl
# ═══════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name veldworks.nl www.veldworks.nl;

    # Redirect www → non-www
    if ($host = www.veldworks.nl) {
        return 301 https://veldworks.nl$request_uri;
    }

    # Redirect HTTP → HTTPS (certbot will update this block)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name veldworks.nl;

    # ── Document root ─────────────────────────────────────
    root /var/www/veldworks;
    index index.html;

    # ── SSL (certbot will populate these) ─────────────────
    # ssl_certificate     /etc/letsencrypt/live/veldworks.nl/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/veldworks.nl/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Clean URLs (.html optional) ───────────────────────
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # ── Custom 404 ────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html { internal; }

    # ── Gzip ──────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/html
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # ── Static asset caching ──────────────────────────────
    location ~* \.(css|js|woff2?|ttf|otf|svg|png|jpg|jpeg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform, immutable";
        access_log off;
    }

    # ── HTML: no cache (so updates deploy immediately) ────
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ── Deny hidden files ─────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
