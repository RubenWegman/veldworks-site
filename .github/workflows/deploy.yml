name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/veldworks
            git checkout -- .
            git clean -fd
            git pull origin master
            cp -r /var/www/veldworks/. /opt/webserver/html/
            docker exec webserver-nginx nginx -s reload
            echo 